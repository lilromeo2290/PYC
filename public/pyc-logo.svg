<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="Progressive Youth Club, Ho — PYC Club">
  <defs>
    <linearGradient id="pycBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2741B5"/>
      <stop offset="100%" stop-color="#1F2E8A"/>
    </linearGradient>
    <linearGradient id="pycGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C766"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Crest -->
  <g transform="translate(8,8)">
    <path d="M24 0 L46 7 V24 C46 38 36 47 24 48 C12 47 2 38 2 24 V7 Z" fill="url(#pycBlue)"/>
    <path d="M24 0 L46 7 V24 C46 38 36 47 24 48 C12 47 2 38 2 24 V7 Z" fill="none" stroke="url(#pycGold)" stroke-width="1.5"/>
    <!-- Rising sun + uplift -->
    <path d="M24 36 V18 M24 18 L17 25 M24 18 L31 25 M24 24 L13 31 M24 24 L35 31" stroke="url(#pycGold)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <circle cx="24" cy="18" r="3.4" fill="url(#pycGold)"/>
    <!-- Three people silhouettes -->
    <g fill="#FFFFFF" opacity="0.95">
      <circle cx="13" cy="40" r="2.2"/>
      <rect x="11.2" y="42.2" width="3.6" height="4.5" rx="1.2"/>
      <circle cx="24" cy="40" r="2.4"/>
      <rect x="22" y="42.4" width="4" height="5" rx="1.2"/>
      <circle cx="35" cy="40" r="2.2"/>
      <rect x="33.2" y="42.2" width="3.6" height="4.5" rx="1.2"/>
    </g>
  </g>
  <!-- Wordmark -->
  <g transform="translate(70,0)">
    <text x="0" y="28" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2E8A" letter-spacing="0.5">PYC <tspan fill="#D4AF37">Club</tspan></text>
    <text x="0" y="48" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="500" fill="#5A6485" letter-spacing="2.5">PROGRESSIVE YOUTH CLUB, HO</text>
    <text x="0" y="60" font-family="Inter, Arial, sans-serif" font-size="9.5" font-weight="600" fill="#D4AF37" letter-spacing="3">WE STAND FOR SUPPORT</text>
  </g>
</svg>
